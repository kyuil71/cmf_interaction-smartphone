<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트폰 인터랙션 테스트</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #222; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            transition: background 0.5s ease; /* 배경색 변경 시 부드러운 효과 */
        }
        #ball { 
            width: 70px; 
            height: 70px; 
            background: crimson; 
            border-radius: 50%; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            transition: left 0.1s ease, top 0.1s ease, transform 0.2s ease, background 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #btn-start { 
            padding: 15px 30px; 
            font-size: 18px; 
            margin-top: 40vh; 
            position: relative; 
            z-index: 10; 
            border: none;
            background: white;
            color: #222;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
        #status {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <button id="btn-start">프로그램 시작하기 (권한 허용)</button>
    <div id="status">버튼을 눌러 시작하세요.</div>
    <div id="ball"></div>

    <script>
        const ball = document.getElementById('ball');
        const btnStart = document.getElementById('btn-start');
        const statusDiv = document.getElementById('status');

        // 색상 매핑 딕셔너리 (인식할 단어 : 실제 변경할 CSS 색상값)
        const colors = {
            "빨간색": "crimson",
            "빨강": "crimson",
            "파란색": "dodgerblue",
            "파랑": "dodgerblue",
            "초록색": "mediumseagreen",
            "초록": "mediumseagreen",
            "노란색": "gold",
            "노랑": "gold",
            "보라색": "rebeccapurple",
            "보라": "rebeccapurple",
            "하얀색": "white",
            "하양": "white",
            "검은색": "black",
            "검정": "black"
        };

        btnStart.addEventListener('click', async () => {
            btnStart.style.display = 'none';
            statusDiv.innerText = "센서 및 마이크 활성화 중...";

            // 1. 움직임 센서 권한 요청 (iOS 13+ 대응)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                } catch (error) {
                    statusDiv.innerText = "센서 권한이 거부되었습니다.";
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            // 2. 개선된 연속 음성 인식 설정 (Web Speech API)
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.continuous = true;       // 말한 후에도 마이크가 꺼지지 않음
                recognition.interimResults = false;     // 확정된 결과만 처리
                recognition.lang = 'ko-KR';

                recognition.onresult = (event) => {
                    // 음성 인식 이벤트에서 가장 최근에 인식된 문장만 정확히 추출
                    const currentResultIndex = event.resultIndex;
                    const text = event.results[currentResultIndex][0].transcript.trim();
                    
                    statusDiv.innerText = `인식된 목소리: ${text}`;
                    
                    // 딕셔너리에 정의된 색상 단어가 포함되어 있는지 확인
                    let colorMatched = false;
                    for (const key in colors) {
                        if (text.includes(key)) {
                            const targetColor = colors[key];
                            
                            // 공의 색상을 바꾸고 튕기는 애니메이션 피드백 제공
                            ball.style.background = targetColor;
                            pulseBall();
                            
                            // 하얀색이나 노란색일 때는 글씨가 안 보일 수 있으므로 전체 배경색도 어울리게 조절
                            if (targetColor === 'white' || targetColor === 'gold') {
                                document.body.style.background = "#333";
                                document.body.style.color = "white";
                            } else if (targetColor === 'black') {
                                document.body.style.background = "#fff";
                                document.body.style.color = "black";
                            }
                            
                            colorMatched = true;
                            break; 
                        }
                    }
                };

                // 모바일 브라우저 환경에서 침묵이 길어져 마이크가 꺼지면 자동으로 다시 켜기
                recognition.onend = () => {
                    recognition.start();
                };

                recognition.start();
                statusDiv.innerText = "말씀해 보세요! (예: 빨간색, 파란색, 노란색...)";
            } else {
                statusDiv.innerText = "이 브라우저는 음성 인식을 지원하지 않습니다.";
            }

            // 3. 터치 이벤트
            window.addEventListener('touchstart', () => {
                ball.style.transform = 'translate(-50%, -50%) scale(1.4)';
            });
            window.addEventListener('touchend', () => {
                ball.style.transform = 'translate(-50%, -50%) scale(1)';
            });
        });

        // 스마트폰 기울기에 따라 공 이동
        function handleOrientation(event) {
            let x = event.gamma; 
            let y = event.beta;  

            // 민감도 및 화면 경계 제한 처리
            let posX = (window.innerWidth / 2) + (x * 6);
            let posY = (window.innerHeight / 2) + (y * 6);

            // 공이 화면 밖으로 완전히 탈출하지 않도록 최소/최대 범위 제한
            posX = Math.max(35, Math.min(window.innerWidth - 35, posX));
            posY = Math.max(35, Math.min(window.innerHeight - 35, posY));

            ball.style.left = `${posX}px`;
            ball.style.top = `${posY}px`;
        }

        // 말할 때마다 알아들었다는 시각적 피드백을 주는 튕김 함수
        function pulseBall() {
            ball.style.transform = 'translate(-50%, -50%) scale(1.4)';
            setTimeout(() => {
                ball.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 200);
        }
    </script>
</body>
</html>
