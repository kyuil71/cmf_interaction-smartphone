<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트폰 인터랙션 테스트</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; color: white; font-family: sans-serif; text-align: center; }
        #ball { width: 50px; height: 50px; background: crimson; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: all 0.1s ease; }
        #btn-start { padding: 15px 30px; font-size: 18px; margin-top: 40vh; position: relative; z-index: 10; }
    </style>
</head>
<body>

    <button id="btn-start">프로그램 시작하기 (권한 허용)</button>
    <div id="status">버튼을 눌러 시작하세요.</div>
    <div id="ball"></div>

    <script>
        const ball = document.getElementById('ball');
        const btnStart = document.getElementById('btn-start');
        const statusDiv = document.getElementById('status');

        btnStart.addEventListener('click', async () => {
            btnStart.style.display = 'none';
            statusDiv.innerText = "센서 및 마이크 활성화 중...";

            // 1. 움직임 센서 권한 요청 (iOS 13+ 대응 포함)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                } catch (error) {
                    statusDiv.innerText = "센서 권한이 거부되었습니다.";
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            // 2. 음성 인식 시작 (Web Speech API)
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.lang = 'ko-KR';
                recognition.onresult = (event) => {
                    const text = event.results[event.results.length - 1][0].transcript.trim();
                    statusDiv.innerText = `인식된 목소리: ${text}`;
                    if(text.includes("빨간색")) ball.style.background = "crimson";
                    if(text.includes("파란색")) ball.style.background = "dodgerblue";
                };
                recognition.start();
            }

            // 3. 터치 이벤트 추가
            window.addEventListener('touchstart', () => {
                ball.style.transform = 'translate(-50%, -50%) scale(1.5)';
            });
            window.addEventListener('touchend', () => {
                ball.style.transform = 'translate(-50%, -50%) scale(1)';
            });
        });

        // 스마트폰 기울기에 따라 공 이동
        function handleOrientation(event) {
            // beta: 앞뒤 기울기 (-180 ~ 180), gamma: 좌우 기울기 (-90 ~ 90)
            let x = event.gamma; 
            let y = event.beta;  

            // 화면 중심을 기준으로 공의 위치 조절
            let posX = (window.innerWidth / 2) + (x * 5);
            let posY = (window.innerHeight / 2) + (y * 5);

            ball.style.left = `${posX}px`;
            ball.style.top = `${posY}px`;
        }
    </script>
</body>
</html>
