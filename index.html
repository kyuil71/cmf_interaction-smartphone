<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>스마트폰 인터랙션 시뮬레이터</title>
<style>
    * { -webkit-tap-highlight-color: transparent; }
    html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #222;
        color: #fff;
        font-family: -apple-system, 'Segoe UI', sans-serif;
        text-align: center;
        touch-action: none;
    }

    /* ── 상단 탭 : 시뮬레이터-2와 동일한 스틸 톤으로 통일 ── */
    #tabs {
        position: fixed;
        top: 0; left: 0; right: 0;
        display: flex;
        z-index: 100;
        background: linear-gradient(180deg, #2e343c 0%, #1b1f26 100%);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
    }
    .tab {
        flex: 1;
        padding: 14px 4px;
        font-size: 14px;
        font-weight: bold;
        color: rgba(255,255,255,0.55);
        border: none;
        background: transparent;
        border-bottom: 3px solid transparent;
        cursor: pointer;
    }
    .tab.active { color: #fff; border-bottom-color: #4fc3f7; }

    /* ── 시작 화면 / 상태 ──────────────────── */
    #btn-start {
        padding: 15px 30px;
        font-size: 18px;
        margin-top: 40vh;
        position: relative;
        z-index: 90;
        border: none;
        background: white;
        color: #222;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    }
    #status {
        position: fixed;
        left: 0; right: 0; bottom: 18px;
        z-index: 95;
        font-size: 15px;
        font-weight: bold;
        text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        pointer-events: none;
        padding: 0 12px;
    }
    #status.on-light { color: #4a4a48; text-shadow: 0 1px 2px rgba(255,255,255,0.8); }

    /* ── 패널 ─────────────────────────────── */
    .panel { position: absolute; inset: 0; display: none; }
    .panel.active { display: block; }

    /* 시뮬레이터-1 : 기본 공 (지름 92px, 2번과 동일) */
    #ball1 {
        width: 92px; height: 92px;
        background: crimson;
        border-radius: 50%;
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        transition: transform 0.18s cubic-bezier(.34,1.56,.64,1);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        cursor: pointer;
    }

    /* 시뮬레이터-2 : 크롬 금속 공 (캔버스) — 위에서 내려다본 시점 */
    #panel2 {
        background:
            radial-gradient(circle at 50% 28%, rgba(150, 180, 210, 0.16) 0%, rgba(0,0,0,0) 60%),
            radial-gradient(circle at 50% 50%, #2b3138 0%, #1d2228 55%, #10141a 100%);
    }
    #metal-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* 시뮬레이터-3 : 하얀 천 캔버스 */
    #panel3 { background: #efede8; }
    #cloth-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="tabs">
    <button class="tab active" data-sim="1">시뮬레이터-1</button>
    <button class="tab" data-sim="2">시뮬레이터-2</button>
    <button class="tab" data-sim="3">시뮬레이터-3</button>
</div>

<button id="btn-start">프로그램 시작하기 (권한 허용)</button>
<div id="status">버튼을 눌러 시작하세요.</div>

<div class="panel active" id="panel1">
    <div id="ball1"></div>
</div>

<div class="panel" id="panel2">
    <canvas id="metal-canvas"></canvas>
</div>

<div class="panel" id="panel3">
    <canvas id="cloth-canvas"></canvas>
</div>

<script>
/* ═════════════════════════════════════════════
   공통 상태
═════════════════════════════════════════════ */
const statusDiv = document.getElementById('status');
const btnStart  = document.getElementById('btn-start');

let activeSim = 1;
let started = false;

let rawGamma = 0, rawBeta = 0;
let gamma = 0, beta = 0;

const BALL_R = 46;   // 공통 공 반지름 (지름 92px)

/* ═════════════════════════════════════════════
   탭 전환
═════════════════════════════════════════════ */
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        activeSim = parseInt(tab.dataset.sim);
        document.getElementById('panel' + activeSim).classList.add('active');
        statusDiv.classList.toggle('on-light', activeSim === 3);
    });
});

/* ═════════════════════════════════════════════
   시작 : 움직임 센서 권한
═════════════════════════════════════════════ */
btnStart.addEventListener('click', async () => {
    btnStart.style.display = 'none';
    statusDiv.innerText = "센서 활성화 중...";
    started = true;

    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            const state = await DeviceOrientationEvent.requestPermission();
            if (state === 'granted') {
                window.addEventListener('deviceorientation', handleOrientation);
                statusDiv.innerText = "스마트폰을 기울여 공을 굴려보세요!";
            } else {
                statusDiv.innerText = "센서 권한이 거부되었습니다.";
            }
        } catch (e) { statusDiv.innerText = "센서 권한이 거부되었습니다."; }
    } else {
        window.addEventListener('deviceorientation', handleOrientation);
        statusDiv.innerText = "스마트폰을 기울여 공을 굴려보세요!";
    }
});

function handleOrientation(event) {
    if (event.gamma === null) return;
    rawGamma = event.gamma;
    rawBeta  = event.beta;
}

// 데스크톱 미리보기 : 마우스로 기울기 흉내
window.addEventListener('mousemove', (e) => {
    if (!started) return;
    rawGamma = ((e.clientX / window.innerWidth)  - 0.5) * 60;
    rawBeta  = ((e.clientY / window.innerHeight) - 0.5) * 60;
});

/* ═════════════════════════════════════════════
   시뮬레이터-1 볼 누르기
═════════════════════════════════════════════ */
const ball1 = document.getElementById('ball1');
ball1.addEventListener('pointerdown', e => {
    e.preventDefault();
    ball1.style.transform = 'translate(-50%, -50%) scale(1.35)';
});
['pointerup', 'pointercancel', 'pointerleave'].forEach(ev =>
    ball1.addEventListener(ev, () =>
        ball1.style.transform = 'translate(-50%, -50%) scale(1)'));

/* ═════════════════════════════════════════════
   금속 공 상태 (시뮬레이터-2, 3 공유)
═════════════════════════════════════════════ */
function makeBallState() {
    return {
        x: null, y: null, vx: 0, vy: 0,
        rollAngle: 0,
        scale: 1, scaleTarget: 1, scaleVel: 0
    };
}
const B2 = makeBallState();
const B3 = makeBallState();

const flecks = [];
for (let i = 0; i < 7; i++) {
    flecks.push({
        phase: Math.random() * Math.PI * 2,
        perp:  (Math.random() - 0.5) * 1.3,
        size:  0.06 + Math.random() * 0.09,
        alpha: 0.05 + Math.random() * 0.07
    });
}

function updateScaleSpring(B) {
    B.scaleVel += (B.scaleTarget - B.scale) * 0.25;
    B.scaleVel *= 0.72;
    B.scale += B.scaleVel;
}

/* ═════════════════════════════════════════════
   공유 크롬 볼 렌더러 (2번·3번 동일)
═════════════════════════════════════════════ */
function drawChromeBall(c, B, R, W, H, t, env) {
    const x = B.x, y = B.y;
    const speed = Math.hypot(B.vx, B.vy);

    const lightX = W / 2, lightY = -H * 0.25;
    let dx = lightX - x, dy = lightY - y;
    const dist = Math.hypot(dx, dy) || 1;
    dx /= dist; dy /= dist;
    const hx = x + dx * R * 0.42 - gamma * 0.4;
    const hy = y + dy * R * 0.42 - beta * 0.4;

    c.save();
    c.beginPath();
    c.arc(x, y, R, 0, Math.PI * 2);
    c.clip();

    // ① 크롬 본체
    const body = c.createRadialGradient(hx, hy, R * 0.05, x, y, R * 1.05);
    body.addColorStop(0,    '#ffffff');
    body.addColorStop(0.18, '#e9eef2');
    body.addColorStop(0.42, '#aab4bd');
    body.addColorStop(0.68, '#67727c');
    body.addColorStop(0.9,  '#2e353c');
    body.addColorStop(1,    '#171c21');
    c.fillStyle = body;
    c.fillRect(x - R, y - R, R * 2, R * 2);

    // ② 화면 정렬 환경 반사 밴드
    const bandShift = -beta * 0.6;
    const envG = c.createLinearGradient(x, y - R + bandShift, x, y + R + bandShift);
    envG.addColorStop(0,    'rgba(235, 245, 252, 0.5)');
    envG.addColorStop(0.38, 'rgba(255, 255, 255, 0.12)');
    envG.addColorStop(0.5,  'rgba(15, 25, 35, 0.55)');
    envG.addColorStop(0.58, 'rgba(120, 140, 158, 0.25)');
    if (env === 'cloth') {
        envG.addColorStop(0.8, 'rgba(248, 246, 240, 0.55)');
        envG.addColorStop(1,   'rgba(238, 235, 228, 0.65)');
    } else {
        envG.addColorStop(0.8, 'rgba(35, 42, 50, 0.5)');
        envG.addColorStop(1,   'rgba(12, 16, 20, 0.6)');
    }
    c.fillStyle = envG;
    c.fillRect(x - R, y - R, R * 2, R * 2);

    // ③ 아래쪽 바운스 라이트
    const bounce = c.createRadialGradient(x, y + R * 0.9, 0, x, y + R * 0.9, R * 1.1);
    if (env === 'cloth') {
        bounce.addColorStop(0, 'rgba(255, 253, 248, 0.5)');
        bounce.addColorStop(1, 'rgba(255, 253, 248, 0)');
    } else {
        bounce.addColorStop(0, 'rgba(120, 145, 170, 0.25)');
        bounce.addColorStop(1, 'rgba(120, 145, 170, 0)');
    }
    c.fillStyle = bounce;
    c.fillRect(x - R, y - R, R * 2, R * 2);

    // ④ 구르는 표면 흠집
    let dirx = 0, diry = 1;
    if (speed > 0.05) { dirx = B.vx / speed; diry = B.vy / speed; }
    for (const f of flecks) {
        const ph = f.phase + B.rollAngle;
        const s = Math.sin(ph), cn = Math.cos(ph);
        if (cn < 0.12) continue;
        const along = s * R * 0.78;
        const perp  = f.perp * R * 0.6;
        const fx = x + dirx * along - diry * perp;
        const fy = y + diry * along + dirx * perp;
        if (Math.hypot(fx - x, fy - y) > R * 0.92) continue;
        c.beginPath();
        c.ellipse(fx, fy, R * f.size * cn + 1, R * f.size * 0.55, Math.atan2(diry, dirx), 0, Math.PI * 2);
        c.fillStyle = `rgba(255,255,255,${f.alpha * cn})`;
        c.fill();
    }

    // ⑤ 스펙큘러 (속도 방향으로 살짝 번짐)
    const stretch = Math.min(1.8, 1 + speed * 0.06);
    c.save();
    c.translate(hx, hy);
    c.rotate(Math.atan2(B.vy, B.vx));
    c.scale(stretch, 1);
    const spec = c.createRadialGradient(0, 0, 0, 0, 0, R * 0.32);
    spec.addColorStop(0,    'rgba(255,255,255,1)');
    spec.addColorStop(0.18, 'rgba(255,255,255,0.85)');
    spec.addColorStop(1,    'rgba(255,255,255,0)');
    c.fillStyle = spec;
    c.fillRect(-R, -R, R * 2, R * 2);
    c.restore();

    // ⑥ 보조 하이라이트
    const spec2 = c.createRadialGradient(x - dx * R * 0.55, y - dy * R * 0.55 + R * 0.2, 0,
                                         x - dx * R * 0.55, y - dy * R * 0.55 + R * 0.2, R * 0.35);
    spec2.addColorStop(0, 'rgba(210, 235, 255, 0.35)');
    spec2.addColorStop(1, 'rgba(210, 235, 255, 0)');
    c.fillStyle = spec2;
    c.fillRect(x - R, y - R, R * 2, R * 2);

    // ⑦ 가장자리 어두운 림
    const rim = c.createRadialGradient(x, y, R * 0.6, x, y, R);
    rim.addColorStop(0, 'rgba(0,0,0,0)');
    rim.addColorStop(0.85, 'rgba(0,0,0,0.18)');
    rim.addColorStop(1, 'rgba(0,0,0,0.45)');
    c.fillStyle = rim;
    c.fillRect(x - R, y - R, R * 2, R * 2);

    c.restore();

    // ⑧ 프레넬 엣지
    const la = Math.atan2(dy, dx);
    c.beginPath();
    c.arc(x, y, R - 1, la - 1.1, la + 1.1);
    c.strokeStyle = 'rgba(255,255,255,0.5)';
    c.lineWidth = 1.6;
    c.stroke();
    c.beginPath();
    c.arc(x, y, R - 1, la + Math.PI - 0.7, la + Math.PI + 0.7);
    c.strokeStyle = env === 'cloth' ? 'rgba(250,248,242,0.45)' : 'rgba(160,180,200,0.22)';
    c.lineWidth = 1.2;
    c.stroke();
}

/* ═════════════════════════════════════════════
   메인 루프
═════════════════════════════════════════════ */
let lastT = 0;
function loop(t) {
    const dt = Math.min(32, t - lastT) / 16.67;
    lastT = t;

    gamma += (rawGamma - gamma) * 0.12;
    beta  += (rawBeta  - beta)  * 0.12;

    if (activeSim === 1 && started) updateSim1();
    if (activeSim === 2)            updateSim2(t, dt);
    if (activeSim === 3)            updateSim3(t, dt);

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ═════════════════════════════════════════════
   시뮬레이터-1
═════════════════════════════════════════════ */
function updateSim1() {
    let posX = (window.innerWidth  / 2) + (gamma * 6);
    let posY = (window.innerHeight / 2) + (beta  * 6);
    posX = Math.max(BALL_R, Math.min(window.innerWidth  - BALL_R, posX));
    posY = Math.max(BALL_R, Math.min(window.innerHeight - BALL_R, posY));
    ball1.style.left = posX + 'px';
    ball1.style.top  = posY + 'px';
}

/* ═════════════════════════════════════════════
   시뮬레이터-2 : 어두운 스튜디오 바닥 위의 크롬 공
═════════════════════════════════════════════ */
const mCanvas = document.getElementById('metal-canvas');
const mCtx = mCanvas.getContext('2d');

function resizeMetal() {
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    mCanvas.width  = window.innerWidth  * dpr;
    mCanvas.height = window.innerHeight * dpr;
    mCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeMetal);
resizeMetal();

function updateSim2(t, dt) {
    const W = window.innerWidth, H = window.innerHeight;
    const R0 = BALL_R;
    if (B2.x === null) { B2.x = W / 2; B2.y = H / 2; }

    if (started) {
        const gAcc = 0.42;
        B2.vx += Math.sin(gamma * Math.PI / 180) * gAcc * dt;
        B2.vy += Math.sin(beta  * Math.PI / 180) * gAcc * dt;
        B2.vx *= Math.pow(0.988, dt);
        B2.vy *= Math.pow(0.988, dt);
        B2.x += B2.vx * dt;
        B2.y += B2.vy * dt;

        const topLimit = R0 + 54;
        if (B2.x < R0)      { B2.x = R0;      B2.vx = -B2.vx * 0.62; }
        if (B2.x > W - R0)  { B2.x = W - R0;  B2.vx = -B2.vx * 0.62; }
        if (B2.y < topLimit){ B2.y = topLimit; B2.vy = -B2.vy * 0.62; }
        if (B2.y > H - R0)  { B2.y = H - R0;  B2.vy = -B2.vy * 0.62; }

        B2.rollAngle += Math.hypot(B2.vx, B2.vy) * dt / R0;
    }

    updateScaleSpring(B2);
    const R = R0 * B2.scale;
    const speed = Math.hypot(B2.vx, B2.vy);

    mCtx.clearRect(0, 0, W, H);

    /* 위에서 내려다본 시점의 그림자 :
       폰 상단에 고정된 광원의 반대 방향으로, 광원에서 멀수록 조금 더 길게 떨어짐 */
    const lightX = W / 2, lightY = -H * 0.25;
    let dx = lightX - B2.x, dy = lightY - B2.y;
    const d = Math.hypot(dx, dy) || 1;
    dx /= d; dy /= d;

    const so = R * (0.45 + d / (H * 2.2));          // 그림자 오프셋
    const shx = B2.x - dx * so - B2.vx * 1.2;        // 움직이면 살짝 끌림
    const shy = B2.y - dy * so - B2.vy * 1.2;
    const sh = mCtx.createRadialGradient(shx, shy, R * 0.15, shx, shy, R * 1.3);
    sh.addColorStop(0,   'rgba(0,0,0,0.5)');
    sh.addColorStop(0.6, 'rgba(0,0,0,0.22)');
    sh.addColorStop(1,   'rgba(0,0,0,0)');
    mCtx.beginPath();
    mCtx.ellipse(shx, shy,
        R * 1.18 * (1 + Math.min(0.4, speed * 0.035)),   // 속도 방향으로 살짝 늘어남
        R * 1.06,
        Math.atan2(-dy, -dx), 0, Math.PI * 2);
    mCtx.fillStyle = sh;
    mCtx.fill();

    // 공 바로 밑의 진한 접촉 음영 (탑뷰에서 공 가장자리로 살짝 비어져 나옴)
    const ao2 = mCtx.createRadialGradient(B2.x, B2.y, R * 0.85, B2.x, B2.y, R * 1.18);
    ao2.addColorStop(0, 'rgba(0,0,0,0.30)');
    ao2.addColorStop(1, 'rgba(0,0,0,0)');
    mCtx.beginPath();
    mCtx.arc(B2.x, B2.y, R * 1.18, 0, Math.PI * 2);
    mCtx.fillStyle = ao2;
    mCtx.fill();

    drawChromeBall(mCtx, B2, R, W, H, t, 'floor');
}

mCanvas.addEventListener('pointerdown', (e) => {
    const rect = mCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    if (B2.x !== null && Math.hypot(mx - B2.x, my - B2.y) < 62) {
        e.preventDefault();
        B2.scaleTarget = 1.35;
    }
});
['pointerup', 'pointercancel'].forEach(ev =>
    mCanvas.addEventListener(ev, () => { B2.scaleTarget = 1; }));

/* ═════════════════════════════════════════════
   시뮬레이터-3 : 하얀 천 위를 구르는 크롬 공
   ─ 첨부 CMF LAB의 FABRIC 시뮬레이션 방식 이식 ─
   · 직조 실(warp/weft) 격자가 임팩트에 의해
     안쪽으로 당겨지고(장력), 물결치고(탄성),
     드래그 파동이 퍼지며 실제 천처럼 변형된다
   · 임팩트는 '공'이 만든다 : 공이 있는 자리는
     항상 눌려 있고, 굴러간 자리에는 임팩트가
     남았다가 복원 속도에 따라 서서히 회복된다
   · 배경(천)을 손으로 터치하는 눌림 효과는 없음
═════════════════════════════════════════════ */
const cCanvas = document.getElementById('cloth-canvas');
const cCtx = cCanvas.getContext('2d');

function resizeCloth() {
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    cCanvas.width  = window.innerWidth  * dpr;
    cCanvas.height = window.innerHeight * dpr;
    cCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCloth);
resizeCloth();

/* 천 물성 (첨부 파일의 기본 슬라이더 값 기준) */
const FAB = {
    pull:    0.62,    // 장력 (당김 강도)
    elastic: 0.44,    // 섬유 탄성
    wave:    0.45,    // 드래그 물결
    shade:   0.62,    // 명암 강도
    gloss:   0.12,    // 광택 (실크감)
    spacing: 24,      // 직조 밀도 (spacing = 52 - 28)
    recover: 0.011    // 복원 속도 (자국이 약 1.5초에 걸쳐 회복)
};

/* 임팩트 시스템 (첨부 파일 방식) */
const impacts = [];          // 공이 지나가며 남긴 자국들 (서서히 회복)
let lastTrailX = null, lastTrailY = null;

// 공이 '현재' 누르고 있는 자리 : 강도가 줄지 않는 지속 임팩트
const ballPress = {
    x: 0, y: 0, dx: 0, dy: 0,
    radius: 110, depth: 46,
    strength: 1, age: 0,
    seed: Math.random() * 999 | 0,
    seed2: Math.random() * 999 | 0,
    angle: 0,
    pullBoost: 1.25,    // 원래보다 실이 살짝만 더 끌려 들어옴
    sharp: true         // 당김이 접촉부 근처에 집중
};

function addTrailImpact(x, y, dx, dy, radius, depth) {
    impacts.push({
        x, y, dx, dy,
        radius, depth,
        recover: FAB.recover,
        strength: 1, age: 0,
        seed: Math.random() * 999 | 0,
        seed2: Math.random() * 999 | 0,
        angle: Math.atan2(dy, dx) || Math.random() * Math.PI * 2
    });
    if (impacts.length > 42) impacts.shift();
}

function tickImpacts(dt) {
    for (let i = impacts.length - 1; i >= 0; i--) {
        const im = impacts[i];
        im.age += dt;
        im.strength -= im.recover * dt;   // 서서히 자연 복원
        if (im.strength <= 0) impacts.splice(i, 1);
    }
    ballPress.age += dt;
}

/* 천 변위 계산 (첨부 fabricDisplace 이식) */
let activeImpacts = [];
function fabDisplace(x, y) {
    let px = 0, py = 0;
    for (const im of activeImpacts) {
        const dx = x - im.x, dy = y - im.y;
        const d = Math.hypot(dx, dy);
        const r = im.radius;
        if (d > r) continue;
        const q = 1 - d / r;
        const fall = q * q * (3 - 2 * q);          // smoothstep
        const s = im.strength;
        const dxN = d ? dx / d : 0, dyN = d ? dy / d : 0;

        // 안쪽으로 당김 (장력) : 실이 눌린 중심을 향해 딸려 들어감
        // 공의 지속 눌림(pullBoost·sharp)은 접촉부에서 훨씬 강하고 가파르게 당겨져
        // 팽팽한 천이 공 무게에 끌려 들어가는 인상을 만든다
        const pb = im.pullBoost || 1;
        const fallP = im.sharp ? Math.pow(fall, 1.6) : fall;
        const inward = -im.depth * 0.22 * FAB.pull * fallP * s * pb;
        px += dxN * inward;
        py += dyN * inward;

        // 드래그 파동 : 굴러가는 방향으로 천이 밀리며 물결이 퍼짐
        const dragFall = fall * s;
        const waveProp = Math.sin(d * 0.08 - im.age * 0.12 + im.seed) * 0.5 + 0.5;
        px += im.dx * 0.12 * dragFall * FAB.wave * waveProp;
        py += im.dy * 0.12 * dragFall * FAB.wave * waveProp;

        // 진행 방향과 수직인 잔물결 (섬유 탄성)
        const vlen = Math.hypot(im.dx, im.dy) || 1;
        const perp = Math.sin(d * 0.14 - im.age * 0.09 + im.seed2) * FAB.elastic * 0.6 * fall * s;
        px += dyN * perp * (-im.dy / vlen);
        py += dxN * perp * (im.dx / vlen);
    }
    return { x: x + px, y: y + py };
}

/* 천 렌더링 (첨부 drawFabric 이식, 하얀 천 톤으로 변환) */
function drawFabric(w, h, t) {
    // 하얀 천 베이스 그라디언트
    const bg = cCtx.createLinearGradient(0, 0, w * 0.6, h);
    bg.addColorStop(0,   '#fbfaf6');
    bg.addColorStop(0.5, '#f2f0ea');
    bg.addColorStop(1,   '#e2dfd7');
    cCtx.fillStyle = bg;
    cCtx.fillRect(0, 0, w, h);

    const spacing = FAB.spacing;
    const subStep = 4;
    cCtx.save();
    cCtx.lineCap = 'round';

    // ── 씨실 (가로 실) ──
    for (let gy = -spacing; gy < h + spacing; gy += spacing) {
        cCtx.beginPath();
        let first = true;
        for (let gx = -60; gx < w + 60; gx += subStep) {
            const p = fabDisplace(gx, gy);
            const drape = Math.sin(gx * 0.018 + t * 0.006) * 0.4;   // 은은한 늘어짐
            if (first) { cCtx.moveTo(p.x, p.y + drape); first = false; }
            else cCtx.lineTo(p.x, p.y + drape);
        }
        cCtx.strokeStyle = 'rgba(255,255,255,0.5)';
        cCtx.lineWidth = 1.1;
        cCtx.stroke();
        cCtx.strokeStyle = 'rgba(120,113,100,0.16)';
        cCtx.lineWidth = 0.55;
        cCtx.stroke();
    }

    // ── 날실 (세로 실) ──
    for (let gx = -spacing; gx < w + spacing; gx += spacing) {
        cCtx.beginPath();
        let first = true;
        for (let gy = -60; gy < h + 60; gy += subStep) {
            const p = fabDisplace(gx, gy);
            const drape = Math.sin(gy * 0.015 + t * 0.005) * 0.35;
            if (first) { cCtx.moveTo(p.x + drape, p.y); first = false; }
            else cCtx.lineTo(p.x + drape, p.y);
        }
        cCtx.strokeStyle = 'rgba(105,99,88,0.17)';
        cCtx.lineWidth = 0.9;
        cCtx.stroke();
        cCtx.strokeStyle = 'rgba(255,255,255,0.22)';
        cCtx.lineWidth = 0.4;
        cCtx.stroke();
    }

    // ── 임팩트별 눌림 음영 + 실크 광택 (첨부 방식) ──
    for (const im of activeImpacts) {
        const s = im.strength, r = im.radius;
        if (s <= 0) continue;

        // 눌린 그릇 모양 그림자
        const sdw = cCtx.createRadialGradient(im.x, im.y, 0, im.x, im.y, r);
        sdw.addColorStop(0,    `rgba(74, 68, 58, ${0.16 * FAB.shade * s})`);
        sdw.addColorStop(0.35, `rgba(96, 89, 78, ${0.09 * FAB.shade * s})`);
        sdw.addColorStop(0.7,  `rgba(120, 112, 100, ${0.03 * FAB.shade * s})`);
        sdw.addColorStop(1,    'rgba(0,0,0,0)');
        cCtx.fillStyle = sdw;
        cCtx.beginPath();
        cCtx.ellipse(im.x, im.y, r * 0.85, r * 0.78, im.angle * 0.1, 0, Math.PI * 2);
        cCtx.fill();

        // 눌린 자국 가장자리의 실크 광택
        const hx2 = im.x - r * 0.2, hy2 = im.y - r * 0.25;
        const hl = cCtx.createRadialGradient(hx2, hy2, 0, hx2, hy2, r * 0.4);
        hl.addColorStop(0, `rgba(255,255,255,${0.30 * FAB.gloss * s + 0.05 * s})`);
        hl.addColorStop(1, 'rgba(255,255,255,0)');
        cCtx.fillStyle = hl;
        cCtx.beginPath();
        cCtx.ellipse(hx2, hy2, r * 0.28, r * 0.2, im.angle * 0.1, 0, Math.PI * 2);
        cCtx.fill();
    }
    cCtx.restore();
}

function updateSim3(t, dt) {
    const W = window.innerWidth, H = window.innerHeight;
    const R0 = BALL_R;
    if (B3.x === null) {
        B3.x = W / 2; B3.y = H / 2;
        lastTrailX = B3.x; lastTrailY = B3.y;
    }

    /* ① 공 물리 : 천 위라 구름 저항이 크고 벽 반발이 부드러움 */
    if (started) {
        const gAcc = 0.36;
        B3.vx += Math.sin(gamma * Math.PI / 180) * gAcc * dt;
        B3.vy += Math.sin(beta  * Math.PI / 180) * gAcc * dt;
        B3.vx *= Math.pow(0.978, dt);
        B3.vy *= Math.pow(0.978, dt);
        // 팽팽한 천의 눌림 골 저항 : 느려지면 자기 골에 안착하듯 멈춘다
        const spd3 = Math.hypot(B3.vx, B3.vy);
        if (spd3 < 1.1) { B3.vx *= Math.pow(0.93, dt); B3.vy *= Math.pow(0.93, dt); }
        B3.x += B3.vx * dt;
        B3.y += B3.vy * dt;
        const topLimit = R0 + 54;
        let hitWall = false;
        if (B3.x < R0)     { B3.x = R0;     B3.vx = -B3.vx * 0.35; hitWall = true; }
        if (B3.x > W - R0) { B3.x = W - R0; B3.vx = -B3.vx * 0.35; hitWall = true; }
        if (B3.y < topLimit) { B3.y = topLimit; B3.vy = -B3.vy * 0.35; hitWall = true; }
        if (B3.y > H - R0) { B3.y = H - R0; B3.vy = -B3.vy * 0.35; hitWall = true; }
        // 천이 출렁이며 공을 받아내는 반동 (공이 살짝 꿀렁하며 깊게 눌림)
        if (hitWall) B3.scaleVel += 0.05;

        B3.rollAngle += Math.hypot(B3.vx, B3.vy) * dt / R0;
    }

    updateScaleSpring(B3);
    const R = R0 * B3.scale;

    /* ② 공 = 임팩트 :
       현재 자리는 지속적으로 눌려 있고 (첨부의 pointerdown에 해당),
       일정 거리 굴러갈 때마다 자국 임팩트를 남긴다 (pointermove 드래그에 해당) */
    ballPress.x = B3.x;
    ballPress.y = B3.y;
    ballPress.dx = B3.vx * 1.6;
    ballPress.dy = B3.vy * 1.6;
    ballPress.angle = Math.atan2(B3.vy, B3.vx) || ballPress.angle;
    ballPress.radius = R * 2.4;                       // 영향 반경 (첨부 기본 155에 상응)
    ballPress.depth  = 50 * B3.scale * B3.scale;      // 눌림 깊이 : 원래보다 살짝만 깊게
    ballPress.strength = 1;                            // 공이 있는 동안은 회복되지 않음

    const moved = Math.hypot(B3.x - lastTrailX, B3.y - lastTrailY);
    if (moved > 15) {
        // 무거운 금속 공이 지나간 자국 : 뒤에 남았다가 서서히 회복
        addTrailImpact(B3.x, B3.y, B3.vx * 1.6, B3.vy * 1.6, R * 2.1, 40 * B3.scale);
        lastTrailX = B3.x; lastTrailY = B3.y;
    }

    tickImpacts(dt);
    activeImpacts = impacts.concat([ballPress]);

    /* ③ 천 렌더링 */
    cCtx.clearRect(0, 0, W, H);
    drawFabric(W, H, t);

    // 부드러운 주변광 비네트
    const vg = cCtx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.45, W/2, H/2, Math.max(W,H)*0.8);
    vg.addColorStop(0, 'rgba(180, 175, 165, 0)');
    vg.addColorStop(1, 'rgba(180, 175, 165, 0.25)');
    cCtx.fillStyle = vg;
    cCtx.fillRect(0, 0, W, H);

    /* ④ 공의 그림자 : 접촉부 진하고 좁게 + 외곽 넓고 연하게 */
    const lightX = W / 2, lightY = -H * 0.25;
    let dx = lightX - B3.x, dy = lightY - B3.y;
    const d = Math.hypot(dx, dy) || 1;
    dx /= d; dy /= d;

    const sox = B3.x - dx * R * 0.55, soy = B3.y - dy * R * 0.55 + R * 0.15;
    const soft = cCtx.createRadialGradient(sox, soy, R * 0.3, sox, soy, R * 1.7);
    soft.addColorStop(0, 'rgba(90, 84, 74, 0.28)');
    soft.addColorStop(1, 'rgba(90, 84, 74, 0)');
    cCtx.beginPath();
    cCtx.ellipse(sox, soy, R * 1.7, R * 1.45, Math.atan2(-dy, -dx), 0, Math.PI * 2);
    cCtx.fillStyle = soft;
    cCtx.fill();

    const core = cCtx.createRadialGradient(B3.x, B3.y + R * 0.12, R * 0.1, B3.x, B3.y + R * 0.12, R * 0.95);
    core.addColorStop(0, 'rgba(60, 55, 47, 0.45)');
    core.addColorStop(1, 'rgba(60, 55, 47, 0)');
    cCtx.beginPath();
    cCtx.ellipse(B3.x, B3.y + R * 0.12, R * 0.95, R * 0.82, 0, 0, Math.PI * 2);
    cCtx.fillStyle = core;
    cCtx.fill();

    /* ⑤ 크롬 공 */
    drawChromeBall(cCtx, B3, R, W, H, t, 'cloth');
}

/* 시뮬레이터-3 : 볼 터치만 반응 (배경 천 터치 눌림은 없음) */
cCanvas.addEventListener('pointerdown', (e) => {
    const rect = cCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    if (B3.x !== null && Math.hypot(mx - B3.x, my - B3.y) < 62) {
        e.preventDefault();
        B3.scaleTarget = 1.35;    // 공이 커지며 천을 더 깊게 누름
    }
});
['pointerup', 'pointercancel'].forEach(ev =>
    cCanvas.addEventListener(ev, () => { B3.scaleTarget = 1; }));
</script>
